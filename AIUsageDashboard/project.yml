name: AIUsageDashboard
options:
  bundleIdPrefix: ai.AIUsageDashboard
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
attributes:
  BuildIndependentTargetsInParallel: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
targets:
  AIUsageDashboardCore:
    type: framework
    platform: macOS
    sources:
      - path: AIUsageDashboardApp/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.AIUsageDashboard.Core
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: ""
    scheme:
      testTargets:
        - AIUsageDashboardCoreTests
  AIUsageDashboardApp:
    type: application
    platform: macOS
    sources:
      - path: AIUsageDashboardApp
        excludes:
          - Core
          - Resources
    dependencies:
      - target: AIUsageDashboardCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.AIUsageDashboard
        INFOPLIST_KEY_CFBundleDisplayName: "AI Usage Dashboard"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme: {}
  AIUsageDashboardCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: AIUsageDashboardCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.AIUsageDashboard.CoreTests
