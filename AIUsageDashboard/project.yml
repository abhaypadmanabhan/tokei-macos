name: AIUsageDashboard
options:
  bundleIdPrefix: ai.AIUsageDashboard
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
attributes:
  BuildIndependentTargetsInParallel: true
settings:
  base:
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: NO
targets:
  AIUsageDashboardCore:
    type: framework
    platform: macOS
    sources:
      - path: AIUsageDashboardApp/Core
    dependencies:
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.AIUsageDashboard.Core
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application: Abhay Padmanabhan (A47GG9FV27)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: A47GG9FV27
    scheme:
      testTargets:
        - AIUsageDashboardCoreTests
  AIUsageDashboardApp:
    type: application
    platform: macOS
    sources:
      - path: AIUsageDashboardApp
        excludes:
          - Core
    dependencies:
      - target: AIUsageDashboardCore
    settings:
      base:
        PRODUCT_NAME: Tokei
        PRODUCT_BUNDLE_IDENTIFIER: ai.padzy.tokei
        INFOPLIST_KEY_CFBundleDisplayName: "Tokei"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application: Abhay Padmanabhan (A47GG9FV27)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: A47GG9FV27
          ENABLE_HARDENED_RUNTIME: YES
    scheme: {}
  AIUsageDashboardCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: AIUsageDashboardCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.AIUsageDashboard.CoreTests
