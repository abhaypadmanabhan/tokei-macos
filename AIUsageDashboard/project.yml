name: AIUsageDashboard
options:
  bundleIdPrefix: ai.AIUsageDashboard
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
attributes:
  BuildIndependentTargetsInParallel: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    majorVersion: 2.6.0
settings:
  base:
    MARKETING_VERSION: "0.5.0"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: ""
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: NO
targets:
  AIUsageDashboardCore:
    type: framework
    platform: macOS
    sources:
      - path: AIUsageDashboardApp/Core
    dependencies:
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.AIUsageDashboard.Core
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application: Abhay Padmanabhan (A47GG9FV27)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: A47GG9FV27
    scheme:
      testTargets:
        - AIUsageDashboardCoreTests
  AIUsageDashboardApp:
    type: application
    platform: macOS
    sources:
      - path: AIUsageDashboardApp
        excludes:
          - Core
    dependencies:
      - target: AIUsageDashboardCore
      - package: Sparkle
    info:
      path: AIUsageDashboardApp/Info.plist
      properties:
        CFBundleDisplayName: "Tokei"
        LSApplicationCategoryType: public.app-category.productivity
        SUFeedURL: https://abhaypadmanabhan.github.io/tokei-macos/appcast.xml
        SUPublicEDKey: "HvBBuRxzgqykdxzKWGTlFUVpWx7W16mdwMtkaprDkiI="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_NAME: Tokei
        PRODUCT_BUNDLE_IDENTIFIER: ai.padzy.tokei
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application: Abhay Padmanabhan (A47GG9FV27)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: A47GG9FV27
          ENABLE_HARDENED_RUNTIME: YES
    scheme: {}
  AIUsageDashboardCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      # Pure UI-layer math (pace notch + tightest-window selection) lives under
      # UI/ per the WP-3 scope, but is a dependency-free function over the frozen
      # Core shapes. Compile that single file into this bundle so the pace/tightest
      # logic is unit-tested by the standard `-scheme AIUsageDashboardCore test`
      # run without pulling the whole app target into the test target.
      - path: AIUsageDashboardApp/UI/MenuBar/MaxxerMath.swift
    dependencies:
      - target: AIUsageDashboardCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.AIUsageDashboard.CoreTests
